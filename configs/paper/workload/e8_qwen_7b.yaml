name: paper-e8-qwen-7b-cache-pressure
output_dir: runs/paper/direct/workload/qwen_7b
experiment_id: e8_cache_pressure
seed: 7
model:
  backend: hf
  model_name_or_path: Qwen/Qwen2.5-7B-Instruct
  device: auto
  torch_dtype: bfloat16
  max_length: 16384
  trust_remote_code: true
  parallelism: single
  device_ids: []
  use_chat_template: true
data:
  source: synthetic
  task: variable_tracking
  benchmark_name: controlled-request-trace
  task_family: state_tracking
  evaluation_partition: test
  selection_seed: 909
  sample_offset: 256
  num_samples: 128
  context_length: 16384
  answer_length: 4
  scorer: contains
  max_generation_tokens: 32
  synthetic_difficulty: medium
task_viability:
  enabled: true
  probe_samples: 32
  min_mean_score: 0.05
  max_mean_score: 0.95
  min_nonzero_fraction: 0.10
  max_perfect_fraction: 0.90
updates:
  targets:
  - lora.q
  - lora.k
  - lora.v
  - lora.qv
  step_count: 1
  update_norm: 0.001
cache:
  strategies:
  - full_recompute
  - stale_reuse
  - periodic_refresh
  - threshold_refresh
  - delta_correction
  - adaptive
  refresh_period: 4
  update_norm_threshold: 0.01
  version_gap_threshold: 8
  failure_map_path: runs/paper/calibration/final/failure_map/failure_map.csv
  oracle_kl_threshold: 0.05
  oracle_top1_threshold: 0.99
  oracle_task_drop_threshold: 0.01
  max_cache_entries: 64
  eviction_policy: lru
  manager_scope: global_workload
metrics:
  compute_tensor_metrics: true
  compute_task_metrics: true
  compute_attention_metrics: false
  compute_flops_metrics: true
measurement:
  warmup_runs: 1
  timed_runs: 3
  bootstrap_resamples: 5000
  confidence_level: 0.95
adapter:
  update_mode: lora_train
  norm_control: target_l2
  lora_rank: 8
  lora_alpha: 16.0
  learning_rate: 0.0002
  train_steps_per_version: 1
  freeze_base_model: true
version_steps:
- 0
- 1
- 2
- 4
- 8
- 16
- 32
