name: paper-e4-qwen-7b-gov_report
output_dir: runs/paper/direct/test/qwen_7b/gov_report
experiment_id: e4_planner_main
seed: 7
model:
  backend: hf
  model_name_or_path: Qwen/Qwen2.5-7B-Instruct
  device: auto
  torch_dtype: bfloat16
  max_length: 16384
  trust_remote_code: true
  parallelism: single
  device_ids: []
  use_chat_template: true
data:
  source: huggingface
  task: longbench_gov_report
  benchmark_name: LongBench
  task_family: summarization
  evaluation_partition: test
  selection_seed: 2027
  shuffle: true
  sample_offset: 0
  num_samples: 96
  context_length: 16384
  dataset_name: THUDM/LongBench
  dataset_config: gov_report
  dataset_split: test
  context_field: context
  question_field: input
  answer_field: answers
  prompt_template: '{context}


    Question: {question}

    Answer:'
  scorer: rouge_l
  truncation_strategy: middle
  answer_length: 128
task_viability:
  enabled: true
  probe_samples: 32
  min_mean_score: 0.05
  max_mean_score: 0.95
  min_nonzero_fraction: 0.1
  max_perfect_fraction: 0.9
updates:
  targets:
  - lora.q
  - lora.k
  - lora.v
  - lora.qv
  - lora.mlp_late
  step_count: 1
  update_norm: 0.001
cache:
  strategies:
  - no_adaptation
  - full_recompute
  - stale_reuse
  - periodic_refresh
  - threshold_refresh
  - adaptive
  - oracle_planner
  refresh_period: 4
  update_norm_threshold: 0.01
  version_gap_threshold: 8
  failure_map_path: runs/paper/calibration/final/failure_map/failure_map.csv
  oracle_kl_threshold: 0.05
  oracle_top1_threshold: 0.99
  oracle_task_drop_threshold: 0.01
metrics:
  compute_tensor_metrics: true
  compute_task_metrics: true
  compute_attention_metrics: false
  compute_flops_metrics: true
measurement:
  warmup_runs: 0
  timed_runs: 1
  bootstrap_resamples: 5000
  confidence_level: 0.95
adapter:
  update_mode: lora_train
  norm_control: target_l2
  lora_rank: 8
  lora_alpha: 16.0
  learning_rate: 0.0002
  train_steps_per_version: 1
  freeze_base_model: true
version_steps:
- 0
- 1
- 2
- 4
- 8
