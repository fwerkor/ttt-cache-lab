name: feasibility-hf-qwen-0-5b
seed: 7
output_dir: runs/feasibility-hf-qwen-0-5b
model:
  backend: hf
  model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
  device: auto
  torch_dtype: auto
  max_length: 1024
  trust_remote_code: true
data:
  task: passkey
  num_samples: 16
  context_length: 1024
  answer_length: 4
updates:
  targets:
    - attention.q
    - attention.k
    - attention.v
    - attention.o
    - mlp.late
    - lora.q
    - lora.k
    - lora.v
    - lora.mlp_late
  step_count: 1
  update_norm: 0.00001
cache:
  strategies:
    - full_recompute
    - stale_reuse
    - frozen_reuse
    - adaptive
metrics:
  compute_tensor_metrics: true
  compute_task_metrics: true
