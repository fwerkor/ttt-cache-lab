name: e3-failure-map-toy
output_dir: runs/e3_failure_map
experiment_id: e3_failure_map
seed: 7
model:
  backend: toy
  num_layers: 6
  hidden_size: 32
  vocab_size: 256
data:
  task: multi_needle
  num_samples: 8
  context_length: 1024
  answer_length: 4
updates:
  targets:
    - lora.q
    - lora.k
    - lora.v
    - lora.qv
    - lora.o
    - lora.attn
    - lora.mlp_early
    - lora.mlp_middle
    - lora.mlp_late
    - mlp.early
    - mlp.middle
    - mlp.late
    - norm
    - output_head
  step_count: 1
  update_norm: 0.01
cache:
  strategies:
    - full_recompute
    - stale_reuse
    - frozen_reuse
    - delta_correction
    - layerwise_recompute
    - adaptive
  refresh_period: 4
adapter:
  update_mode: random
  lora_rank: 8
  lora_alpha: 16.0
  learning_rate: 0.01
  train_steps_per_version: 1
version_steps: [0, 1, 2, 4, 8, 16, 32]
