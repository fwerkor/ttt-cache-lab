name: ascend-e2-version-drift-llama-3_2-1b
output_dir: runs/ascend_e2_version_drift_llama_3_2_1b
experiment_id: e2_version_drift
seed: 7
model:
  backend: ascend_hf
  modelscope_model_id: LLM-Research/Llama-3.2-1B-Instruct
  model_name_or_path: meta-llama/Llama-3.2-1B-Instruct
  device: npu:0
  torch_dtype: bfloat16
  max_length: 8192
  trust_remote_code: true
data:
  task: passkey
  num_samples: 4
  context_length: 8192
  answer_length: 4
updates:
  targets:
    - lora.q
    - lora.k
    - lora.v
    - lora.qv
    - lora.mlp_late
  step_count: 1
  update_norm: 0.00001
cache:
  strategies:
    - full_recompute
    - stale_reuse
    - frozen_reuse
    - periodic_refresh
    - delta_correction
    - adaptive
  refresh_period: 4
  update_norm_threshold: 0.05
adapter:
  update_mode: lora_train
  lora_rank: 8
  lora_alpha: 16.0
  learning_rate: 0.0002
  train_steps_per_version: 1
  freeze_base_model: true
version_steps: [0, 1, 2, 4, 8]
