name: e2-version-drift-qwen-0-5b
output_dir: runs/e2_version_drift_qwen_0_5b
experiment_id: e2_version_drift
seed: 7
model:
  backend: hf
  model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
  device: auto
  torch_dtype: auto
  max_length: 1024
  trust_remote_code: true
  use_chat_template: true
data:
  task: passkey
  num_samples: 64
  context_length: 1024
  answer_length: 4
  scorer: numeric_match
  synthetic_difficulty: easy
  max_generation_tokens: 8
task_viability:
  enabled: true
  probe_samples: 32
  min_mean_score: 0.05
  max_mean_score: 0.95
  min_nonzero_fraction: 0.10
  max_perfect_fraction: 0.90
updates:
  targets:
  - lora.q
  - lora.k
  - lora.v
  - lora.qv
  - lora.mlp_late
  step_count: 1
  update_norm: 1.0e-05
cache:
  strategies:
  - full_recompute
  - stale_reuse
  - frozen_reuse
  - periodic_refresh
  - delta_correction
  - adaptive
  refresh_period: 4
  update_norm_threshold: 0.05
adapter:
  update_mode: lora_train
  lora_rank: 4
  lora_alpha: 8.0
  learning_rate: 0.0005
  train_steps_per_version: 1
  freeze_base_model: true
version_steps:
- 0
- 1
- 2
- 4
