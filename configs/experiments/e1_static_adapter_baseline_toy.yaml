name: e1-static-adapter-baseline-toy
output_dir: runs/e1_static_adapter_baseline
experiment_id: e1_static_adapter_baseline
seed: 7
model:
  backend: toy
  num_layers: 4
  hidden_size: 32
  vocab_size: 256
data:
  task: passkey
  num_samples: 8
  context_length: 512
  answer_length: 4
  adapter_activation_marker: <ADAPTER>
updates:
  targets:
  - output_head
  - lora.q
  - lora.k
  - lora.v
  - lora.qv
  step_count: 1
  update_norm: 0.01
cache:
  strategies:
  - full_recompute
  - no_adaptation
  - base_cache_reuse
  - adapter_specific_cache
  - static_base_delta
  - stale_reuse
  - frozen_reuse
  - adaptive
  - alora_prefix_reuse
  - lragent_adapter_cache
  - forkkv_base_delta
  refresh_period: 4
adapter:
  update_mode: static_lora
  lora_rank: 8
  lora_alpha: 16.0
  learning_rate: 0.01
  train_steps_per_version: 1
  static_adapter_sequence:
  - 0
  - 1
  - 2
  - 0
  - 2
  - 1
  - 0
version_steps:
- 0
- 1
- 2
- 4
- 8
- 16
