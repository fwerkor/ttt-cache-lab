name: e2-version-drift-llama-3_1-8b
output_dir: runs/e2_version_drift_llama_3_1_8b
experiment_id: e2_version_drift
seed: 7
model:
  backend: hf
  model_name_or_path: meta-llama/Llama-3.1-8B-Instruct
  device: auto
  torch_dtype: auto
  max_length: 8192
  trust_remote_code: true
data:
  task: passkey
  num_samples: 4
  context_length: 8192
  answer_length: 4
updates:
  targets:
    - lora.q
    - lora.k
    - lora.v
    - lora.mlp_late
  step_count: 1
  update_norm: 0.00001
cache:
  strategies:
    - full_recompute
    - stale_reuse
    - frozen_reuse
    - periodic_refresh
    - adaptive
  refresh_period: 4
adapter:
  update_mode: lora_train
  lora_rank: 8
  lora_alpha: 16.0
  learning_rate: 0.0002
  train_steps_per_version: 1
  freeze_base_model: true
version_steps: [0, 1, 2, 4, 8]
