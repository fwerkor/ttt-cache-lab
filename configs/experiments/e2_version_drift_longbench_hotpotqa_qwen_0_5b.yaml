name: e2-version-drift-longbench-hotpotqa-qwen-0-5b
output_dir: runs/e2_version_drift_longbench_hotpotqa_qwen_0_5b
experiment_id: e2_version_drift_longbench_qa
seed: 7
model:
  backend: hf
  model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
  device: auto
  torch_dtype: auto
  max_length: 4096
  trust_remote_code: true
data:
  source: huggingface
  task: longbench_hotpotqa
  dataset_name: THUDM/LongBench
  dataset_config: hotpotqa
  dataset_split: test
  num_samples: 32
  context_length: 4096
  context_field: context
  question_field: input
  answer_field: answers
  prompt_template: "{context}\n\nQuestion: {question}\nAnswer:"
  truncation_strategy: middle
  scorer: token_f1
updates:
  targets: [lora.q, lora.k, lora.v, lora.qv, lora.mlp_late]
  step_count: 1
  update_norm: 0.00001
cache:
  strategies: [full_recompute, stale_reuse, frozen_reuse, periodic_refresh, delta_correction, adaptive]
  refresh_period: 4
  update_norm_threshold: 0.05
adapter:
  update_mode: lora_train
  lora_rank: 4
  lora_alpha: 8.0
  learning_rate: 0.0005
  train_steps_per_version: 1
  freeze_base_model: true
version_steps: [0, 1, 2, 4, 8]
