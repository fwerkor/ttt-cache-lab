name: ascend-e5-delta-correction-qwen-0-5b
output_dir: runs/ascend_e5_delta_correction_qwen_0_5b
experiment_id: e5_delta_correction
seed: 7
model:
  backend: ascend_hf
  model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
  modelscope_model_id: Qwen/Qwen2.5-0.5B-Instruct
  device: npu:0
  torch_dtype: bfloat16
  max_length: 2048
  trust_remote_code: true
  use_chat_template: true
data:
  task: passkey
  num_samples: 48
  context_length: 2048
  answer_length: 4
  scorer: numeric_match
  synthetic_difficulty: easy
task_viability:
  enabled: true
  probe_samples: 32
  min_mean_score: 0.05
  max_mean_score: 1.0
  min_nonzero_fraction: 0.10
  max_perfect_fraction: 1.0
updates:
  targets:
  - lora.k_late
  - lora.v_late
  - lora.qv
  step_count: 1
  update_norm: 1.0e-05
cache:
  strategies:
  - full_recompute
  - stale_reuse
  - static_base_delta
  - delta_correction
  - adaptive
  refresh_period: 4
  update_norm_threshold: 0.05
adapter:
  update_mode: lora_train
  lora_rank: 4
  lora_alpha: 8.0
  learning_rate: 0.0005
  train_steps_per_version: 1
  freeze_base_model: true
version_steps:
- 0
- 1
- 2
- 4
