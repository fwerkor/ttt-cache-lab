adapter:
  freeze_base_model: true
  learning_rate: 0.0002
  lora_alpha: 16.0
  lora_rank: 8
  train_steps_per_version: 1
  update_mode: lora_train
cache:
  refresh_period: 4
  strategies:
  - full_recompute
  - stale_reuse
  - frozen_reuse
  - periodic_refresh
  - delta_correction
  - adaptive
  update_norm_threshold: 0.05
data:
  answer_length: 4
  context_length: 4096
  num_samples: 4
  task: passkey
experiment_id: e2_version_drift
model:
  backend: ascend_hf
  device: npu:0
  max_length: 8192
  model_name_or_path: Qwen/Qwen1.5-MoE-A2.7B-Chat
  modelscope_model_id: Qwen/Qwen1.5-MoE-A2.7B-Chat
  torch_dtype: bfloat16
  trust_remote_code: true
  use_chat_template: true
name: ascend-e2-version-drift-qwen1_5-moe-a2_7b
output_dir: runs/ascend_e2_version_drift_qwen1_5_moe_a2_7b
seed: 7
updates:
  step_count: 1
  targets:
  - lora.q_middle
  - lora.k_middle
  - lora.v_middle
  - lora.moe_router_middle
  - lora.moe_shared_expert_middle
  - moe.routed_experts_middle
  update_norm: 1.0e-05
version_steps:
- 0
- 1
- 2
- 4
- 8
