name: e2-version-drift-qwen1_5-moe-a2_7b
output_dir: runs/e2_version_drift_qwen1_5_moe_a2_7b
experiment_id: e2_version_drift
seed: 7
model:
  backend: hf
  modelscope_model_id: Qwen/Qwen1.5-MoE-A2.7B-Chat
  model_name_or_path: Qwen/Qwen1.5-MoE-A2.7B-Chat
  device: auto
  torch_dtype: auto
  max_length: 8192
  trust_remote_code: true
  use_chat_template: true
data:
  task: passkey
  num_samples: 4
  context_length: 4096
  answer_length: 4
updates:
  targets:
  - lora.q_middle
  - lora.k_middle
  - lora.v_middle
  - moe.router_middle
  - lora.moe_shared_expert_middle
  - moe.routed_experts_middle
  step_count: 1
  update_norm: 1.0e-05
cache:
  strategies:
  - full_recompute
  - stale_reuse
  - frozen_reuse
  - periodic_refresh
  - delta_correction
  - adaptive
  refresh_period: 4
  update_norm_threshold: 0.05
adapter:
  update_mode: lora_train
  lora_rank: 8
  lora_alpha: 16.0
  learning_rate: 0.0002
  train_steps_per_version: 1
  freeze_base_model: true
version_steps:
- 0
- 1
- 2
- 4
- 8
