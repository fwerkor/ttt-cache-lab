name: ascend-e2-version-drift-qwen-32b-8npu
output_dir: runs/ascend_e2_version_drift_qwen_32b_8npu
experiment_id: e2_version_drift
seed: 7
model:
  backend: ascend_hf
  model_name_or_path: Qwen/Qwen2.5-32B-Instruct
  modelscope_model_id: Qwen/Qwen2.5-32B-Instruct
  device: npu
  torch_dtype: bfloat16
  max_length: 4096
  trust_remote_code: true
  parallelism: model_shard
  device_ids:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
  use_chat_template: true
data:
  task: common_words
  num_samples: 32
  context_length: 4096
  answer_length: 4
  scorer: set_f1
  synthetic_difficulty: hard
  max_generation_tokens: 32
task_viability:
  enabled: true
  probe_samples: 32
  min_mean_score: 0.05
  max_mean_score: 0.95
  min_nonzero_fraction: 0.10
  max_perfect_fraction: 0.90
updates:
  targets:
  - lora.q
  - lora.k
  - lora.v
  - lora.qv
  - lora.mlp_late
  update_norm: 1.0e-05
cache:
  strategies:
  - full_recompute
  - stale_reuse
  - delta_correction
  - layerwise_recompute
  - adaptive
  refresh_period: 4
  update_norm_threshold: 0.05
adapter:
  update_mode: lora_train
  lora_rank: 8
  lora_alpha: 16.0
  learning_rate: 0.0001
  train_steps_per_version: 1
  freeze_base_model: true
version_steps:
- 0
- 1
- 2
