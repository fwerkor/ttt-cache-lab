name: e4-planner-main-qwen-0-5b
output_dir: runs/e4_planner_main_qwen_0_5b
experiment_id: e4_planner_main
seed: 7
model:
  backend: hf
  model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
  modelscope_model_id: Qwen/Qwen2.5-0.5B-Instruct
  device: auto
  torch_dtype: auto
  max_length: 2048
  trust_remote_code: true
  use_chat_template: true
data:
  task: key_value
  num_samples: 64
  context_length: 2048
  answer_length: 4
  scorer: contains
  synthetic_difficulty: easy
task_viability:
  enabled: true
  probe_samples: 32
  min_mean_score: 0.05
  max_mean_score: 0.95
  min_nonzero_fraction: 0.10
  max_perfect_fraction: 0.90
updates:
  targets:
  - lora.q
  - lora.k
  - lora.v
  - lora.qv
  - lora.mlp_late
  - norm
  update_norm: 1.0e-05
cache:
  strategies:
  - no_adaptation
  - full_recompute
  - stale_reuse
  - periodic_refresh
  - threshold_refresh
  - static_base_delta
  - delta_correction
  - layerwise_recompute
  - adaptive
  - oracle_planner
  refresh_period: 4
  update_norm_threshold: 0.05
  failure_map_path: runs/e3_failure_map_qwen_0_5b/failure_map/failure_map.csv
  oracle_kl_threshold: 0.05
  oracle_task_drop_threshold: 0.01
adapter:
  update_mode: lora_train
  lora_rank: 8
  lora_alpha: 16.0
  learning_rate: 0.0002
  train_steps_per_version: 1
  freeze_base_model: true
version_steps:
- 0
- 1
- 2
- 4
- 8
