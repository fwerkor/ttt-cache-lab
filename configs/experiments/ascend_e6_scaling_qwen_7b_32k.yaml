name: ascend-e6-scaling-qwen-7b-32k
output_dir: runs/ascend_e6_scaling_qwen_7b_32k
experiment_id: e6_scaling
seed: 7
model:
  backend: ascend_hf
  model_name_or_path: Qwen/Qwen2.5-7B-Instruct
  modelscope_model_id: Qwen/Qwen2.5-7B-Instruct
  device: npu:0
  torch_dtype: bfloat16
  max_length: 32768
  trust_remote_code: true
  use_chat_template: true
data:
  task: variable_tracking
  num_samples: 16
  context_length: 32768
  answer_length: 4
  scorer: contains
  synthetic_difficulty: medium
task_viability:
  enabled: true
  probe_samples: 16
  min_mean_score: 0.05
  max_mean_score: 0.95
  min_nonzero_fraction: 0.10
  max_perfect_fraction: 0.90
updates:
  targets:
  - lora.q
  - lora.k
  - lora.v
  - lora.qv
  step_count: 1
  update_norm: 1.0e-05
cache:
  strategies:
  - full_recompute
  - stale_reuse
  - periodic_refresh
  - threshold_refresh
  - adaptive
  - oracle_planner
  refresh_period: 4
  update_norm_threshold: 0.05
adapter:
  update_mode: lora_train
  lora_rank: 8
  lora_alpha: 16.0
  learning_rate: 0.0002
  train_steps_per_version: 1
  freeze_base_model: true
version_steps:
- 0
- 1
- 2
- 4
- 8
