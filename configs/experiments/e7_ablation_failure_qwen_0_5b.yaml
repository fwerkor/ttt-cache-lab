name: e7-ablation-failure-qwen-0-5b
output_dir: runs/e7_ablation_failure_qwen_0_5b
experiment_id: e7_ablation_failure
seed: 7
model:
  backend: hf
  model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
  modelscope_model_id: Qwen/Qwen2.5-0.5B-Instruct
  device: auto
  torch_dtype: auto
  max_length: 2048
  trust_remote_code: true
data:
  task: variable_tracking
  num_samples: 4
  context_length: 2048
  answer_length: 4
updates:
  targets:
    - lora.q
    - lora.k
    - lora.v
    - lora.qv
    - lora.attn
    - lora.mlp_early
    - lora.mlp_late
    - norm
  update_norm: 0.00001
cache:
  strategies:
    - no_adaptation
    - full_recompute
    - stale_reuse
    - adaptive
    - adaptive_no_version
    - adaptive_no_target
    - adaptive_no_norm
    - adaptive_no_delta
    - adaptive_no_partial
    - adaptive_no_periodic
  refresh_period: 4
  update_norm_threshold: 0.03
adapter:
  update_mode: lora_train
  lora_rank: 8
  lora_alpha: 16.0
  learning_rate: 0.0002
  train_steps_per_version: 1
  freeze_base_model: true
version_steps: [0, 1, 2, 4, 8]
